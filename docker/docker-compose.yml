version: '3.8'

services:
  # ─── Zookeeper ──────────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.1
    container_name: hospital-zookeeper
    hostname: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-log:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD", "echo", "ruok", "|", "nc", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Kafka Broker ──────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.7.1
    container_name: hospital-kafka
    hostname: kafka
    depends_on:
      zookeeper:
        condition: service_started
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168  # 7 days retention
      KAFKA_LOG_RETENTION_BYTES: 1073741824  # 1GB
      KAFKA_LOG_SEGMENT_BYTES: 104857600  # 100MB segments
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ─── Kafka Topic Initialization ────────────────────────────────────────────
  kafka-init:
    image: confluentinc/cp-kafka:7.7.1
    container_name: hospital-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command: |
      "
      echo 'Creating Kafka topics...'

      kafka-topics --create --if-not-exists \
        --bootstrap-server kafka:29092 \
        --replication-factor 1 \
        --partitions 7 \
        --topic hospital_adt_events \
        --config retention.ms=604800000

      kafka-topics --create --if-not-exists \
        --bootstrap-server kafka:29092 \
        --replication-factor 1 \
        --partitions 3 \
        --topic hospital_alerts \
        --config retention.ms=604800000

      echo 'Topics created successfully:'
      kafka-topics --list --bootstrap-server kafka:29092

      echo 'Topic details:'
      kafka-topics --describe --bootstrap-server kafka:29092 --topic hospital_adt_events
      kafka-topics --describe --bootstrap-server kafka:29092 --topic hospital_alerts
      "

  # ─── Kafka UI (optional, useful for debugging) ─────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: hospital-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: hospital-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
      DYNAMIC_CONFIG_ENABLED: "true"

volumes:
  zookeeper-data:
  zookeeper-log:
  kafka-data:
